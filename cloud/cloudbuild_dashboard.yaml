# Build + push the read-only dashboard image (CPU only). Run:
#   gcloud builds submit --config cloud/cloudbuild_dashboard.yaml \
#       --substitutions _IMAGE=asia-south1-docker.pkg.dev/PROJECT/showroom/dashboard:latest .
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'cloud/Dockerfile.dashboard', '-t', '${_IMAGE}', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_IMAGE}']
images: ['${_IMAGE}']
options:
  machineType: E2_HIGHCPU_8
timeout: 1200s
